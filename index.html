<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #1f3f8b, #2f79c3);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      padding: 36px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    p {
      margin: 0 0 24px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
    }

    .ball-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .ball {
      width: 64px;
      height: 64px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: radial-gradient(circle at top left, #fff, #ffd966);
      color: #1c2240;
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: 0 12px 18px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease;
    }

    .ball:hover {
      transform: translateY(-4px);
    }

    button {
      border: none;
      outline: none;
      cursor: pointer;
      background: linear-gradient(90deg, #ffd966, #fb8c00);
      color: #1c2240;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 999px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.18);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.24);
    }

    button:active {
      transform: translateY(0);
    }

    small {
      display: block;
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.65);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>로또 번호 추첨기</h1>
    <p>아래 버튼을 눌러 1부터 45까지의 숫자 중에서 6개의 로또 번호를 무작위로 생성합니다.</p>

    <div class="ball-list" id="ballList">
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
      <div class="ball">-</div>
    </div>

    <button id="drawButton">번호 추첨하기</button>
    <small>다시 클릭하면 새로운 번호가 생성됩니다.</small>
  </div>

  <script>
    const ballList = document.getElementById('ballList');
    const drawButton = document.getElementById('drawButton');

    function generateLottoNumbers() {
      const numbers = Array.from({ length: 45 }, (_, index) => index + 1);
      const selected = [];

      while (selected.length < 6) {
        const randomIndex = Math.floor(Math.random() * numbers.length);
        selected.push(numbers.splice(randomIndex, 1)[0]);
      }

      return selected.sort((a, b) => a - b);
    }

    function renderBalls(numbers) {
      ballList.innerHTML = '';
      numbers.forEach((num) => {
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.textContent = num;
        ballList.appendChild(ball);
      });
    }

    drawButton.addEventListener('click', () => {
      const lottoNumbers = generateLottoNumbers();
      renderBalls(lottoNumbers);
    });
  </script>
</body>
</html>
